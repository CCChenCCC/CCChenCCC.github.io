<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影作品 · 相册 | 陈庆晨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --ink: #1a1a2e;
            --accent: #c9a227;
            --accent-light: #e8d48b;
            --surface: #faf9f6;
            --muted: #8a8a8a;
            --border: #e8e4de;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--surface);
            color: var(--ink);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(250, 249, 246, 0.88);
            border-bottom: 1px solid rgba(232, 228, 222, 0.5);
        }

        .nav-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }

        .nav-links a {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0%; height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--ink); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }

        /* Page Header */
        .page-header {
            padding: 10rem 2rem 3rem;
            text-align: center;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 1rem;
        }

        .page-divider {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 1.5rem auto 0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 2rem auto 0;
            border-bottom: 1px solid var(--border);
            max-width: 600px;
        }

        .tab-btn {
            padding: 0.8rem 2.5rem;
            border: none;
            background: none;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            color: var(--muted);
            cursor: pointer;
            letter-spacing: 0.08em;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 100%; height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: var(--ink); font-weight: 500; }
        .tab-btn.active::after { transform: scaleX(1); }

        /* Gallery panels */
        .album-panel { display: none; }

        .album-panel.active {
            display: block;
        }

        /* === 瀑布流布局（保留原始比例）=== */
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            columns: 3;
            column-gap: 1.5rem;
        }

        .photo-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: var(--border);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .photo-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .photo-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .photo-item:hover img { transform: scale(1.03); }

        .photo-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 2rem 1.2rem 1.2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .photo-item:hover .photo-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active { opacity: 1; pointer-events: all; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 2px;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem; right: 2rem;
            width: 48px; height: 48px;
            border: none;
            background: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lightbox-close:hover { transform: rotate(90deg); }

        /* Footer */
        .footer {
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--ink); }

        /* Scroll reveal */
        .photo-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .photo-item.visible { opacity: 1; transform: translateY(0); }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery { columns: 2; }
        }

        @media (max-width: 600px) {
            .gallery { columns: 1; }
            .nav { padding: 1rem 1.5rem; }
            .tabs { overflow-x: auto; }
            .tab-btn { padding: 0.8rem 1.5rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="nav-logo">陈庆晨</a>
        <ul class="nav-links">
            <li><a href="index.html">主页</a></li>
            <li><a href="about.html">关于我</a></li>
            <li><a href="photos-album.html" class="active">摄影</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1 class="page-title">摄影作品</h1>
        <div class="page-divider"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="world">世界</button>
        <button class="tab-btn" data-tab="life">人生</button>
        <button class="tab-btn" data-tab="bw">B&W</button>
    </div>

    <!-- 世界 -->
    <div class="album-panel active" id="panel-world">
        <div class="gallery" id="gallery-world">
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/world-01.jpg" alt="夕阳鸟影" loading="lazy">
                <div class="photo-caption">夕阳 · 水面剪影</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/world-02.jpg" alt="黑天鹅" loading="lazy">
                <div class="photo-caption">天鹅湖 · 展翅</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/world-03.jpg" alt="维港全景" loading="lazy">
                <div class="photo-caption">香港 · 维多利亚港</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/world-04.jpg" alt="天鹅倒影" loading="lazy">
                <div class="photo-caption">天鹅湖 · 倒影</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/world-05.jpg" alt="云层" loading="lazy">
                <div class="photo-caption">天空 · 云层</div>
            </div>
        </div>
    </div>

    <!-- 人生 -->
    <div class="album-panel" id="panel-life">
        <div class="gallery" id="gallery-life">
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/life-01.jpg" alt="剪影" loading="lazy">
                <div class="photo-caption">剪影 · 逆光</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/life-02.jpg" alt="童趣" loading="lazy">
                <div class="photo-caption">童趣 · 小手</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/life-03.jpg" alt="陪伴" loading="lazy">
                <div class="photo-caption">陪伴 · 时光</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/life-04.jpg" alt="岁月" loading="lazy">
                <div class="photo-caption">岁月 · 静好</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/life-05.jpg" alt="日常" loading="lazy">
                <div class="photo-caption">日常 · 片段</div>
            </div>
        </div>
    </div>

    <!-- B&W -->
    <div class="album-panel" id="panel-bw">
        <div class="gallery" id="gallery-bw">
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-01.jpg" alt="积云" loading="lazy">
                <div class="photo-caption">积云 · 质感</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-02.jpg" alt="城市夜景" loading="lazy">
                <div class="photo-caption">城市 · 十字</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-03.jpg" alt="建筑剪影" loading="lazy">
                <div class="photo-caption">光影 · 剪影</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-04.jpg" alt="混凝土" loading="lazy">
                <div class="photo-caption">空间 · 俯瞰</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-05.jpg" alt="自行车" loading="lazy">
                <div class="photo-caption">静物 · 停放</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-06.jpg" alt="夜景" loading="lazy">
                <div class="photo-caption">夜色 · 徘徊</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-07.jpg" alt="工匠" loading="lazy">
                <div class="photo-caption">匠心 · 雕刻</div>
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="photos/bw-08.jpg" alt="街景" loading="lazy">
                <div class="photo-caption">街头 · 瞬间</div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <div class="footer">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回主页
        </a>
    </div>

    <script>
        function openLightbox(el) {
            document.getElementById('lightbox-img').src = el.querySelector('img').src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e.target === e.currentTarget || e.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')});
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.album-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + tab).classList.add('active');
                observeGallery(tab);
            });
        });

        // Scroll reveal
        function observeGallery(tab) {
            const items = document.querySelectorAll('#gallery-' + tab + ' .photo-item');
            items.forEach((item, i) => {
                item.classList.remove('visible');
                setTimeout(() => {
                    item.classList.add('visible');
                }, i * 60);
            });
        }

        observeGallery('world');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影作品 · 相册 | 陈庆晨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --ink: #1a1a2e;
            --accent: #c9a227;
            --accent-light: #e8d48b;
            --surface: #faf9f6;
            --muted: #8a8a8a;
            --border: #e8e4de;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--surface);
            color: var(--ink);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(250, 249, 246, 0.88);
            border-bottom: 1px solid rgba(232, 228, 222, 0.5);
        }

        .nav-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }

        .nav-links a {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0%; height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--ink); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }

        .page-header {
            padding: 10rem 2rem 3rem;
            text-align: center;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 1rem;
        }

        .page-divider {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 1.5rem auto 0;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 2rem auto 0;
            border-bottom: 1px solid var(--border);
            max-width: 600px;
        }

        .tab-btn {
            padding: 0.8rem 2.5rem;
            border: none;
            background: none;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            color: var(--muted);
            cursor: pointer;
            letter-spacing: 0.08em;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 100%; height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: var(--ink); font-weight: 500; }
        .tab-btn.active::after { transform: scaleX(1); }

        .album-panel {
            display: none;
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .album-panel.active { display: block; }

        .album-desc {
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        .album-photo {
            overflow: hidden;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            background: var(--border);
        }

        .album-photo img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s ease;
        }

        .album-photo:hover img {
            transform: scale(1.03);
        }

        .album-photo .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 60%, rgba(0,0,0,0.4));
            opacity: 0;
            transition: opacity 0.4s;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .album-photo:hover .overlay { opacity: 1; }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active { opacity: 1; pointer-events: all; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 2px;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem; right: 2rem;
            width: 48px; height: 48px;
            border: none;
            background: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lightbox-close:hover { transform: rotate(90deg); }

        .footer {
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--ink); }

        @media (max-width: 900px) {
            .album-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .album-grid { grid-template-columns: 1fr; gap: 1rem; }
            .nav { padding: 1rem 1.5rem; }
            .tabs { overflow-x: auto; }
            .tab-btn { padding: 0.8rem 1.5rem; font-size: 0.8rem; }
        }

        .album-photo {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .album-photo.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="nav-logo">陈庆晨</a>
        <ul class="nav-links">
            <li><a href="index.html">主页</a></li>
            <li><a href="photos-album.html" class="active">摄影</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1 class="page-title">摄影作品</h1>
        <div class="page-divider"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="world">世界</button>
        <button class="tab-btn" data-tab="life">人生</button>
        <button class="tab-btn" data-tab="bw">B&W</button>
    </div>

    <div class="album-panel active" id="panel-world">
        <p class="album-desc">镜头里的世界一角</p>
        <div class="album-grid" id="grid-world">
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/world-01.jpg" alt="夕阳鸟影" loading="lazy">
                <div class="overlay">夕阳 · 水面剪影</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/world-02.jpg" alt="黑天鹅" loading="lazy">
                <div class="overlay">天鹅湖 · 展翅</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/world-03.jpg" alt="维港全景" loading="lazy">
                <div class="overlay">香港 · 维多利亚港</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/world-04.jpg" alt="天鹅倒影" loading="lazy">
                <div class="overlay">天鹅湖 · 倒影</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/world-05.jpg" alt="云层" loading="lazy">
                <div class="overlay">天空 · 云层</div>
            </div>
        </div>
    </div>

    <div class="album-panel" id="panel-life">
        <p class="album-desc">值得定格的瞬间</p>
        <div class="album-grid" id="grid-life">
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-01.jpg" alt="剪影" loading="lazy">
                <div class="overlay">剪影 · 逆光</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-02.jpg" alt="童趣" loading="lazy">
                <div class="overlay">童趣 · 小手</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-03.jpg" alt="陪伴" loading="lazy">
                <div class="overlay">陪伴 · 时光</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-04.jpg" alt="岁月" loading="lazy">
                <div class="overlay">岁月 · 静好</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-05.jpg" alt="日常" loading="lazy">
                <div class="overlay">日常 · 片段</div>
            </div>
        </div>
    </div>

    <div class="album-panel" id="panel-bw">
        <p class="album-desc">光影之间</p>
        <div class="album-grid" id="grid-bw">
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-01.jpg" alt="剪影" loading="lazy">
                <div class="overlay">剪影 · 逆光</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-02.jpg" alt="童趣" loading="lazy">
                <div class="overlay">童趣 · 小手</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-03.jpg" alt="陪伴" loading="lazy">
                <div class="overlay">陪伴 · 时光</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-04.jpg" alt="岁月" loading="lazy">
                <div class="overlay">岁月 · 静好</div>
            </div>
            <div class="album-photo" onclick="openLightbox(this)">
                <img src="photos/life-05.jpg" alt="日常" loading="lazy">
                <div class="overlay">日常 · 片段</div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <div class="footer">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回主页
        </a>
    </div>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.album-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + tab).classList.add('active');
                observePanel(tab);
            });
        });

        function openLightbox(el) {
            const img = el.querySelector('img');
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e.target === e.currentTarget || e.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')});
        });

        function observePanel(panelId) {
            const panel = document.getElementById('panel-' + panelId);
            if (!panel) return;
            const photos = panel.querySelectorAll('.album-photo');
            const obs = new IntersectionObserver((entries) => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => entry.target.classList.add('visible'), i * 80);
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            photos.forEach(p => obs.observe(p));
        }

        observePanel('world');
    </script>
</body>
</html>

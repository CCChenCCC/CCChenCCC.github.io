<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈庆晨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --ink: #1a1a2e;
            --accent: #c9a227;
            --accent-light: #e8d48b;
            --surface: #faf9f6;
            --muted: #8a8a8a;
            --border: #e8e4de;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--surface);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* progress bar */
        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            background: linear-gradient(to right, var(--accent), var(--accent-light));
            width: 0%;
            z-index: 9999;
            transition: width 0.15s linear;
            box-shadow: 0 0 8px rgba(201, 162, 39, 0.5);
        }

        /* cursor glow */
        #cursor-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.06s ease-out;
            opacity: 0;
        }
        body:hover #cursor-glow { opacity: 1; }

        /* nav */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(250, 249, 246, 0.88);
            border-bottom: 1px solid rgba(232, 228, 222, 0.5);
            transform: translateY(-100%);
            animation: navSlide 0.6s ease forwards 0.3s;
        }
        @keyframes navSlide { to { transform: translateY(0); } }

        .nav-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--ink);
            text-decoration: none;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.5s;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.6s;
        }

        .nav-links a {
            font-size: 0.82rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.08em;
            transition: color 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0%; height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--ink); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }

        /* main */
        .main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* orbs */
        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.1) 0%, transparent 70%);
            top: -15%; left: -15%;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(26, 26, 46, 0.06) 0%, transparent 70%);
            bottom: -10%; right: -10%;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -15px); }
        }

        /* avatar */
        .avatar-wrap {
            position: relative;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.7s;
        }

        .avatar-ring {
            width: 120px; height: 120px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            box-shadow: 0 8px 32px rgba(201, 162, 39, 0.2);
        }

        .avatar-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(201, 162, 39, 0.3);
        }

        /* name */
        .name {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2.8rem, 7vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--ink);
            margin-bottom: 0.8rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.9s;
        }

        /* tags */
        .tags {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.1s;
        }

        .tag {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 0.4rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--muted);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
        }

        /* divider */
        .divider {
            width: 40px; height: 1px;
            background: var(--accent);
            margin: 0 auto 2.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.2s;
        }

        /* contact */
        .contact {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.4s;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.88rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }

        .contact-item:hover { color: var(--ink); }

        .contact-item svg {
            width: 16px; height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            flex-shrink: 0;
        }

        /* scroll hint */
        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.8s;
        }

        .scroll-hint span {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            animation: scrollDrop 2s ease-in-out infinite;
        }

        @keyframes scrollDrop {
            0% { transform: scaleY(0); transform-origin: top; opacity: 0; }
            50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
            100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
        }

        /* fade up animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* responsive */
        @media (max-width: 640px) {
            .nav { padding: 1rem 1.5rem; }
            .nav-links { gap: 1.5rem; }
            .contact { gap: 1.5rem; }
            .avatar-ring { width: 96px; height: 96px; }
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>
    <div id="cursor-glow"></div>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">陈庆晨</a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">主页</a></li>
            <li><a href="about.html">关于我</a></li>
            <li><a href="photos-album.html">摄影</a></li>
        </ul>
    </nav>

    <!-- Background orbs -->
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Main -->
    <main class="main">
        <!-- Avatar -->
        <div class="avatar-wrap">
            <div class="avatar-ring">
                <img src="avatar.jpg" alt="陈庆晨"
                     onerror="this.style.background='var(--border)'; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2280%22%3E👤%3C/text%3E%3C/svg%3E'">
            </div>
        </div>

        <!-- Name -->
        <h1 class="name">陈庆晨</h1>

        <!-- Tags -->
        <div class="tags">
            <span class="tag">E型i人</span>
            <span class="tag">高校合作</span>
            <span class="tag">AI产学研</span>
        </div>

        <div class="divider"></div>

        <!-- Contact -->
        <div class="contact">
            <a href="mailto:15210848304@139.com" class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                15210848304@139.com
            </a>
            <a href="tel:15210848304" class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                15210848304
            </a>
        </div>

        <!-- Scroll hint -->
        <div class="scroll-hint">
            <div class="scroll-line"></div>
            <span>探索更多</span>
        </div>
    </main>

    <script>
    (function() {
        // Loading progress bar
        var bar = document.getElementById('progress-bar');
        var loaded = 0;
        var interval = setInterval(function() {
            loaded += Math.random() * 15;
            if (loaded >= 100) { loaded = 100; clearInterval(interval); }
            bar.style.width = loaded + '%';
            if (loaded >= 100) setTimeout(function() { bar.style.opacity = '0'; }, 400);
        }, 80);

        // Cursor glow
        var glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', function(e) {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    })();
    </script>
</body>
</html>

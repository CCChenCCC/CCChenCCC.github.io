<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影作品 | 陈庆晨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --ink: #1a1a2e;
            --accent: #c9a227;
            --accent-light: #e8d48b;
            --surface: #faf9f6;
            --muted: #8a8a8a;
            --border: #e8e4de;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--surface);
            color: var(--ink);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(250, 249, 246, 0.85);
            border-bottom: 1px solid rgba(232, 228, 222, 0.5);
        }

        .nav-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s;
            position: relative;
            padding-bottom: 2px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0%; height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--ink); }
        .nav-links a:hover::after { width: 100%; }

        .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }

        /* Page Header */
        .page-header {
            padding: 10rem 2rem 4rem;
            text-align: center;
            position: relative;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 0.2em;
        }

        .page-divider {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 1.5rem auto 0;
        }

        /* Grid Gallery */
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            columns: 3;
            column-gap: 1.5rem;
        }

        .photo-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: var(--border);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .photo-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .photo-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .photo-item:hover img {
            transform: scale(1.03);
        }

        .photo-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 2rem 1.2rem 1.2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .photo-item:hover .photo-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 2px;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem; right: 2rem;
            width: 48px; height: 48px;
            border: none;
            background: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lightbox-close:hover { transform: rotate(90deg); }

        .lightbox-caption {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* Footer */
        .footer {
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--ink); }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery { columns: 2; }
        }

        @media (max-width: 600px) {
            .gallery { columns: 1; padding: 1rem; }
            .nav { padding: 1rem 1.5rem; }
            .nav-links { gap: 1rem; }
        }

        /* Reveal animation */
        .photo-item {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.4s ease;
        }

        .photo-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">陈庆晨</a>
        <ul class="nav-links">
            <li><a href="index.html#experience">经历</a></li>
            <li><a href="index.html#education">教育</a></li>
            <li><a href="photos-grid.html" class="active">摄影</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">摄影作品</h1>
        <p class="page-subtitle">EVERYDAY MOMENTS</p>
        <div class="page-divider"></div>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery" id="gallery">
        <!-- 用占位图，替换为你的照片 -->
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/1000?random=1" alt="作品1" loading="lazy">
            <div class="photo-caption">黄昏 · 2024</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/600?random=2" alt="作品2" loading="lazy">
            <div class="photo-caption">街角 · 2024</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/1100?random=3" alt="作品3" loading="lazy">
            <div class="photo-caption">光影 · 2023</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/700?random=4" alt="作品4" loading="lazy">
            <div class="photo-caption">清晨 · 2024</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/900?random=5" alt="作品5" loading="lazy">
            <div class="photo-caption">归途 · 2023</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/650?random=6" alt="作品6" loading="lazy">
            <div class="photo-caption">静物 · 2024</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/1000?random=7" alt="作品7" loading="lazy">
            <div class="photo-caption">远方 · 2023</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/750?random=8" alt="作品8" loading="lazy">
            <div class="photo-caption">雨后 · 2024</div>
        </div>
        <div class="photo-item" onclick="openLightbox(this)">
            <img src="https://picsum.photos/800/850?random=9" alt="作品9" loading="lazy">
            <div class="photo-caption">窗边 · 2024</div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回主页
        </a>
    </div>

    <script>
        // Reveal on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, i * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.photo-item').forEach(item => {
            observer.observe(item);
        });

        // Lightbox
        function openLightbox(el) {
            const img = el.querySelector('img');
            const caption = el.querySelector('.photo-caption');
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-caption').textContent = caption ? caption.textContent : '';
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e.target === e.currentTarget || e.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')});
        });
    </script>
</body>
</html>
